name: Java/Kotlin CI with Kotest

on:
  push:
    branches: [ "main" ]

# C'EST ICI QU'ON DONNE LE DROIT D'ÉCRIRE LE TABLEAU
permissions:
  contents: read
  issues: write
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # On lance les tests (même si l'un échoue, on continue pour voir le tableau)
      - name: Run All Tests
        run: ./gradlew clean test testIntegration testComponent --continue

      # C'EST CETTE ÉTAPE QUI RECRÉE LE TABLEAU QUE TU RECHERCHES
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() # S'exécute même si les tests échouent
        with:
          files: "**/build/test-results/**/*.xml"