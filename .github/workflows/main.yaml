name: Java/Kotlin CI with Kotest

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Autorisations nécessaires pour publier les résultats et le rapport JaCoCo
    permissions:
      contents: read
      issues: write
      pull-requests: write
      checks: write

    steps:
      # 1. Récupérer le code du dépôt
      - uses: actions/checkout@v4

      # 2. Installer Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 3. Donner les droits d'exécution au script Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Compiler et lancer les tests
      - name: Build and Test with Gradle
        run: ./gradlew build

      # 5. Générer le rapport de couverture JaCoCo
      - name: Generate JaCoCo Report
        run: ./gradlew jacocoTestReport

      # 6. Publier le rapport de couverture dans le PR / Pipeline
      - name: Log Code Coverage
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80

      # 7. Publier les résultats des tests (Plugin demandé)
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() # Toujours exécuter pour voir les erreurs si les tests échouent
        with:
          files: "**/build/test-results/**/*.xml"